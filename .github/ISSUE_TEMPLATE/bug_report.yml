name: Bug report
description: Report a reproducible defect or regression
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Exact steps or command sequence to reproduce the issue.
      placeholder: |
        1. Run `...`
        2. Open `...`
        3. Observe `...`
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Bun version, Cora version, and connector/provider info.
      placeholder: |
        - OS:
        - Bun:
        - Cora:
        - Connector:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs, stack traces, or screenshots.
      render: shell
